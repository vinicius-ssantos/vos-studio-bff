name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

  test-self-hosted:
    name: Test (self-hosted python-ci)
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-self-hosted')
    runs-on: [self-hosted, linux, x64, python-ci]
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show runner context
        run: |
          echo "runner.name=${RUNNER_NAME}"
          echo "runner.os=${RUNNER_OS}"
          python --version

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q